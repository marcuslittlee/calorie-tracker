<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Onboarding Modal -->
        <div id="onboardingModal" class="onboarding-modal">
            <div class="onboarding-content">
                <div class="onboarding-header">
                    <h2>Welcome! 👋</h2>
                    <p>Let's set up your calorie tracker</p>
                </div>

                <form id="onboardingForm">
                    <div class="form-group">
                        <label>Weight (kg)</label>
                        <input type="number" id="weight" placeholder="e.g., 75" required min="20" max="300" step="0.1">
                    </div>

                    <div class="form-group">
                        <label>Height (cm)</label>
                        <input type="number" id="height" placeholder="e.g., 180" required min="100" max="250">
                    </div>

                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age" placeholder="e.g., 25" required min="13" max="120">
                    </div>

                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender" required>
                            <option value="">Select gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Your Goal</label>
                        <div class="goal-options">
                            <div class="goal-option">
                                <input type="radio" id="goal_maintain" name="goal" value="maintain" checked>
                                <label for="goal_maintain">Maintain Weight</label>
                            </div>
                            <div class="goal-option">
                                <input type="radio" id="goal_lose" name="goal" value="lose">
                                <label for="goal_lose">Lose Weight (15% deficit)</label>
                            </div>
                            <div class="goal-option">
                                <input type="radio" id="goal_gain" name="goal" value="gain">
                                <label for="goal_gain">Gain Weight (15% surplus)</label>
                            </div>
                        </div>
                    </div>

                    <div class="onboarding-buttons">
                        <button type="submit" class="btn-primary">Get Started →</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Header -->
        <header class="header">
            <div>
                <h1>🍎 CalorieTrack <small>(demo update)</small></h1>
            </div>
            <span class="date-display" id="dateDisplay"></span>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Today Tab -->
            <section id="todayTab" class="tab-content active">
                <!-- Calorie Progress Card -->
                <div class="card calorie-card">
                    <div class="card-header">
                        <h2>Daily Calories</h2>
                    </div>
                    <div class="calorie-display">
                        <div class="calorie-main">
                            <span class="calorie-current" id="caloriesCurrent">0</span>
                            <span class="calorie-unit">kcal</span>
                        </div>
                        <div class="calorie-remaining" id="caloriesRemaining">2500 remaining</div>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                </div>

                <!-- Macros Card -->
                <div class="card macros-card">
                    <div class="card-header">
                        <h2>Macros</h2>
                    </div>
                    <div class="macros-grid">
                        <div class="macro-item">
                            <div class="macro-header">
                                <span class="macro-icon">🥩</span>
                                <span class="macro-name">Protein</span>
                            </div>
                            <div class="macro-value" id="proteinValue">0g</div>
                            <div class="macro-progress">
                                <div class="macro-bar" id="proteinBar"></div>
                            </div>
                        </div>
                        <div class="macro-item">
                            <div class="macro-header">
                                <span class="macro-icon">🍞</span>
                                <span class="macro-name">Carbs</span>
                            </div>
                            <div class="macro-value" id="carbsValue">0g</div>
                            <div class="macro-progress">
                                <div class="macro-bar" id="carbsBar"></div>
                            </div>
                        </div>
                        <div class="macro-item">
                            <div class="macro-header">
                                <span class="macro-icon">🥑</span>
                                <span class="macro-name">Fat</span>
                            </div>
                            <div class="macro-value" id="fatValue">0g</div>
                            <div class="macro-progress">
                                <div class="macro-bar" id="fatBar"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Food Search Card -->
                <div class="card search-card">
                    <div class="card-header">
                        <h2>Add Food</h2>
                    </div>
                    <div class="search-container">
                        <input 
                            type="text" 
                            id="foodSearch" 
                            placeholder="🔍 Search for a food..." 
                            class="search-input"
                            autocomplete="off"
                        >
                        <div id="searchResults" class="search-results hidden"></div>
                    </div>
                    <div class="add-food-form">
                        <div class="form-row">
                            <select id="mealCategory" class="meal-select">
                                <option value="Breakfast">Breakfast</option>
                                <option value="Lunch">Lunch</option>
                                <option value="Dinner">Dinner</option>
                                <option value="Snacks" selected>Snacks</option>
                            </select>
                        </div>
                        <div class="form-row">
                            <input 
                                type="text" 
                                id="selectedFood" 
                                placeholder="Selected food" 
                                readonly 
                                class="food-input"
                            >
                            <button id="clearFood" class="clear-btn">✕</button>
                        </div>
                        <div class="form-row">
                            <input 
                                type="number" 
                                id="grams" 
                                placeholder="Grams" 
                                class="grams-input"
                                min="1"
                            >
                            <button id="addFoodBtn" class="add-btn">+ Add Food</button>
                        </div>
                    </div>
                </div>

                <!-- Today's Meals -->
                <div class="meals-section">
                    <h2>Today's Meals</h2>
                    <div id="mealsGrid" class="meals-grid">
                        <!-- Meals will be populated by JavaScript -->
                    </div>
                </div>
            </section>

            <!-- History Tab -->
            <section id="historyTab" class="tab-content">
                <div id="historyList" class="history-container"></div>
            </section>

            <!-- Statistics Tab -->
            <section id="statisticsTab" class="tab-content">
                <div class="stats-container">
                    <h3>Weekly Average</h3>
                    <div id="statsDisplay" class="stats-display"></div>
                    <canvas id="caloriesChart" class="chart"></canvas>
                </div>
            </section>

            <!-- Settings Tab -->
            <section id="settingsTab" class="tab-content">
                <div id="settingsContainer" class="settings-container">
                    <!-- form will be injected by JS -->
                </div>
            </section>
        </main>

        <!-- Navigation Tabs -->
        <nav class="nav-tabs">
            <button class="nav-btn active" data-tab="todayTab">📅 Today</button>
            <button class="nav-btn" data-tab="historyTab">📋 History</button>
            <button class="nav-btn" data-tab="statisticsTab">📊 Stats</button>
            <button class="nav-btn" data-tab="settingsTab">⚙️ Settings</button>
        </nav>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
