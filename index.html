<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Onboarding Modal -->
        <div id="onboardingModal" class="onboarding-modal">
            <div class="onboarding-content">
                <div class="onboarding-header">
                    <h2>Welcome! 👋</h2>
                    <p>Let's set up your calorie tracker</p>
                </div>

                <form id="onboardingForm">
                    <div class="form-group">
                        <label>Weight (kg)</label>
                        <input type="number" id="weight" placeholder="e.g., 75" required min="20" max="300" step="0.1">
                    </div>

                    <div class="form-group">
                        <label>Height (cm)</label>
                        <input type="number" id="height" placeholder="e.g., 180" required min="100" max="250">
                    </div>

                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age" placeholder="e.g., 25" required min="13" max="120">
                    </div>

                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender" required>
                            <option value="">Select gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Your Goal</label>
                        <div class="goal-options">
                            <div class="goal-option">
                                <input type="radio" id="goal_maintain" name="goal" value="maintain" checked>
                                <label for="goal_maintain">Maintain Weight</label>
                            </div>
                            <div class="goal-option">
                                <input type="radio" id="goal_lose" name="goal" value="lose">
                                <label for="goal_lose">Lose Weight (15% deficit)</label>
                            </div>
                            <div class="goal-option">
                                <input type="radio" id="goal_gain" name="goal" value="gain">
                                <label for="goal_gain">Gain Weight (15% surplus)</label>
                            </div>
                        </div>
                    </div>

                    <div class="onboarding-buttons">
                        <button type="submit" class="btn-primary">Get Started →</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Header -->
        <header class="header">
            <div>
                <h1>🍎 CalorieTrack <small>(demo update)</small></h1>
            </div>
            <span class="date-display" id="dateDisplay"></span>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Today Tab -->
            <section id="todayTab" class="tab-content active">
                <!-- Calorie Progress -->
                <div class="calorie-progress-card">
                    <div class="calorie-header">
                        <span class="calorie-label">Daily Calories</span>
                        <span class="calorie-target" id="calorieTarget"></span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div class="calorie-display">
                        <div class="calorie-current" id="caloriesCurrent">0 kcal</div>
                        <div class="calorie-remaining" id="caloriesRemaining">Goal: 2500 kcal</div>
                    </div>
                </div>

                <!-- Macros Container -->
                <div class="macros-container">
                    <div class="macro-card">
                        <div class="macro-icon">🥩</div>
                        <div class="macro-name">Protein</div>
                        <div class="macro-value"><span id="proteinValue">0</span><span class="macro-unit">g</span></div>
                    </div>
                    <div class="macro-card">
                        <div class="macro-icon">🍞</div>
                        <div class="macro-name">Carbs</div>
                        <div class="macro-value"><span id="carbsValue">0</span><span class="macro-unit">g</span></div>
                    </div>
                    <div class="macro-card">
                        <div class="macro-icon">🥑</div>
                        <div class="macro-name">Fat</div>
                        <div class="macro-value"><span id="fatValue">0</span><span class="macro-unit">g</span></div>
                    </div>
                </div>

                <!-- Search and Input -->
                <div class="search-container">
                    <input 
                        type="text" 
                        id="foodSearch" 
                        placeholder="🔍 Search for a food..." 
                        class="search-input"
                        autocomplete="off"
                    >
                    <div id="searchResults" class="search-results hidden"></div>
                </div>

                <div class="input-section">
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="selectedFood" 
                            placeholder="Selected food" 
                            readonly 
                            class="food-input"
                        >
                        <button id="clearFood" class="clear-btn">✕</button>
                    </div>
                    <div class="input-group">
                        <input 
                            type="number" 
                            id="grams" 
                            placeholder="Grams" 
                            class="grams-input"
                            min="1"
                        >
                        <button id="addFoodBtn" class="add-btn">+ Add Food</button>
                    </div>
                </div>

                <!-- Foods List -->
                <div class="foods-list">
                    <h3>Today's Log</h3>
                    <div id="foodsList" class="foods-container"></div>
                </div>
            </section>

            <!-- History Tab -->
            <section id="historyTab" class="tab-content">
                <div id="historyList" class="history-container"></div>
            </section>

            <!-- Statistics Tab -->
            <section id="statisticsTab" class="tab-content">
                <div class="stats-container">
                    <h3>Weekly Average</h3>
                    <div id="statsDisplay" class="stats-display"></div>
                    <canvas id="caloriesChart" class="chart"></canvas>
                </div>
            </section>
        </main>

        <!-- Navigation Tabs -->
        <nav class="nav-tabs">
            <button class="nav-btn active" data-tab="todayTab">📅 Today</button>
            <button class="nav-btn" data-tab="historyTab">📋 History</button>
            <button class="nav-btn" data-tab="statisticsTab">📊 Stats</button>
        </nav>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
